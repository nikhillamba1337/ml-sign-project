<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🤟 Real-Time Sign Language Detector</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            padding: 30px;
            max-width: 1200px;
            width: 100%;
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
            font-size: 2.5em;
        }

        .main-content {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 30px;
        }

        .video-section {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        #video-canvas {
            width: 100%;
            border: 3px solid #1e3c72;
            border-radius: 10px;
            background: #000;
        }

        .controls {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        button {
            padding: 12px 20px;
            font-size: 14px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn-primary {
            background: #1e3c72;
            color: white;
            grid-column: 1 / -1;
        }

        .btn-primary:hover {
            background: #2a5298;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(30, 60, 114, 0.3);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        .btn-secondary {
            background: #e74c3c;
            color: white;
        }

        .btn-secondary:hover {
            background: #c0392b;
            transform: translateY(-2px);
        }

        .btn-accent {
            background: #27ae60;
            color: white;
        }

        .btn-accent:hover {
            background: #229954;
            transform: translateY(-2px);
        }

        .controls-info {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            font-size: 13px;
            color: #555;
            border-left: 4px solid #1e3c72;
        }

        .controls-info strong {
            color: #1e3c72;
            display: block;
            margin-bottom: 8px;
        }

        .controls-info p {
            margin: 4px 0;
        }

        .right-panel {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .status-box {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 10px;
            border: 2px solid #e0e0e0;
        }

        .status-box h3 {
            color: #1e3c72;
            margin-bottom: 12px;
            font-size: 16px;
        }

        .status-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
            border-bottom: 1px solid #e0e0e0;
        }

        .status-item:last-child {
            border-bottom: none;
        }

        .status-label {
            color: #666;
            font-weight: 500;
        }

        .status-value {
            color: #1e3c72;
            font-weight: 700;
            font-size: 18px;
        }

        .status-icon {
            display: inline-block;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            margin-right: 8px;
        }

        .status-icon.active {
            background: #27ae60;
        }

        .status-icon.inactive {
            background: #e74c3c;
        }

        .text-output {
            background: white;
            border: 2px solid #1e3c72;
            border-radius: 10px;
            padding: 15px;
            min-height: 100px;
            word-wrap: break-word;
            line-height: 1.6;
            font-size: 16px;
            color: #333;
        }

        .text-output:empty::before {
            content: "Detected letters will appear here...";
            color: #999;
            font-style: italic;
        }

        .error-box {
            background: #f8d7da;
            border: 1px solid #f5c6cb;
            color: #721c24;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        .success-box {
            background: #d4edda;
            border: 1px solid #c3e6cb;
            color: #155724;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        .detected-letter-display {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: white;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            font-weight: bold;
            font-size: 24px;
            min-height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .confidence {
            font-size: 14px;
            margin-top: 8px;
            opacity: 0.9;
        }

        @media (max-width: 768px) {
            .main-content {
                grid-template-columns: 1fr;
            }

            h1 {
                font-size: 1.8em;
            }

            .controls {
                grid-template-columns: 1fr;
            }
        }

        .fps-counter {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(0, 0, 0, 0.7);
            color: #27ae60;
            padding: 8px 12px;
            border-radius: 5px;
            font-size: 12px;
            font-weight: bold;
        }

        .video-wrapper {
            position: relative;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🤟 Real-Time Sign Language Detector</h1>

        <div id="error-container"></div>

        <div class="main-content">
            <!-- Video Section -->
            <div class="video-section">
                <div class="video-wrapper">
                    <canvas id="video-canvas"></canvas>
                    <div class="fps-counter">FPS: <span id="fps">0</span></div>
                </div>

                <div class="controls">
                    <button class="btn-primary" id="start-btn">🎥 Start Detection</button>
                    <button class="btn-secondary" id="stop-btn">⏹️ Stop</button>
                    <button class="btn-accent" id="capture-btn">📸 Capture Letter (W)</button>
                    <button class="btn-secondary" id="delete-btn">🗑️ Delete (S)</button>
                </div>

                <div class="controls-info">
                    <strong>📋 Keyboard Shortcuts:</strong>
                    <p><strong>W</strong> - Capture current letter</p>
                    <p><strong>S</strong> - Delete last letter</p>
                    <p><strong>B</strong> - Clear all text</p>
                    <p><strong>V</strong> - Add space</p>
                    <p><strong>C</strong> - Clear all</p>
                    <p><strong>Q</strong> - Stop detection</p>
                </div>
            </div>

            <!-- Right Panel -->
            <div class="right-panel">
                <!-- Status Box -->
                <div class="status-box">
                    <h3>📊 Status</h3>
                    <div class="status-item">
                        <span class="status-label">
                            <span class="status-icon" id="detection-status"></span>
                            Detection
                        </span>
                        <span class="status-value" id="detection-status-text">OFF</span>
                    </div>
                    <div class="status-item">
                        <span class="status-label">
                            <span class="status-icon" id="camera-status"></span>
                            Camera
                        </span>
                        <span class="status-value" id="camera-status-text">OFF</span>
                    </div>
                    <div class="status-item">
                        <span class="status-label">Detected</span>
                        <span class="status-value" id="current-letter">-</span>
                    </div>
                    <div class="status-item">
                        <span class="status-label">Confidence</span>
                        <span class="status-value" id="confidence">-</span>
                    </div>
                </div>

                <!-- Detected Letters Display -->
                <div class="detected-letter-display" id="latest-letter">
                    Waiting...
                </div>

                <!-- Text Output -->
                <div>
                    <h3 style="color: #1e3c72; margin-bottom: 10px;">📝 Detected Text</h3>
                    <div class="text-output" id="text-output"></div>
                    <div style="margin-top: 10px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                        <button class="btn-accent" id="space-btn">➕ Add Space (V)</button>
                        <button class="btn-secondary" id="clear-btn">🧹 Clear (C)</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Configuration
        const CONFIG = {
            videoWidth: 640,
            videoHeight: 480,
            processingInterval: 33, // ~30 FPS
            confidenceThreshold: 0.5
        };

        // State
        let state = {
            isDetecting: false,
            cameraActive: false,
            currentLetter: null,
            currentConfidence: null,
            storedLetters: [],
            lastFrameTime: Date.now(),
            frameCount: 0,
            fps: 0,
            detectionLoop: null
        };

        // DOM Elements
        const videoCanvas = document.getElementById('video-canvas');
        const ctx = videoCanvas.getContext('2d');
        const startBtn = document.getElementById('start-btn');
        const stopBtn = document.getElementById('stop-btn');
        const captureBtn = document.getElementById('capture-btn');
        const deleteBtn = document.getElementById('delete-btn');
        const spaceBtn = document.getElementById('space-btn');
        const clearBtn = document.getElementById('clear-btn');
        const textOutput = document.getElementById('text-output');
        const currentLetterDisplay = document.getElementById('current-letter');
        const confidenceDisplay = document.getElementById('confidence');
        const latestLetterDisplay = document.getElementById('latest-letter');
        const detectionStatus = document.getElementById('detection-status');
        const detectionStatusText = document.getElementById('detection-status-text');
        const cameraStatus = document.getElementById('camera-status');
        const cameraStatusText = document.getElementById('camera-status-text');
        const errorContainer = document.getElementById('error-container');
        const fpsDisplay = document.getElementById('fps');

        let stream = null;

        // Initialize video canvas size
        function initializeCanvas() {
            videoCanvas.width = CONFIG.videoWidth;
            videoCanvas.height = CONFIG.videoHeight;
        }

        // Show error message
        function showError(message) {
            errorContainer.innerHTML = `<div class="error-box">${message}</div>`;
            setTimeout(() => {
                errorContainer.innerHTML = '';
            }, 5000);
        }

        // Show success message
        function showSuccess(message) {
            errorContainer.innerHTML = `<div class="success-box">${message}</div>`;
            setTimeout(() => {
                errorContainer.innerHTML = '';
            }, 3000);
        }

        // Update UI
        function updateUI() {
            currentLetterDisplay.textContent = state.currentLetter || '-';
            confidenceDisplay.textContent = state.currentConfidence ? `${(state.currentConfidence * 100).toFixed(0)}%` : '-';
            textOutput.textContent = state.storedLetters.join('');
            
            // Update detection status
            if (state.isDetecting) {
                detectionStatus.classList.add('active');
                detectionStatus.classList.remove('inactive');
                detectionStatusText.textContent = 'ON';
            } else {
                detectionStatus.classList.remove('active');
                detectionStatus.classList.add('inactive');
                detectionStatusText.textContent = 'OFF';
            }

            // Update camera status
            if (state.cameraActive) {
                cameraStatus.classList.add('active');
                cameraStatus.classList.remove('inactive');
                cameraStatusText.textContent = 'ON';
            } else {
                cameraStatus.classList.remove('active');
                cameraStatus.classList.add('inactive');
                cameraStatusText.textContent = 'OFF';
            }

            // Update latest letter display
            if (state.currentLetter) {
                latestLetterDisplay.innerHTML = `
                    ${state.currentLetter}
                    <div class="confidence">${(state.currentConfidence * 100).toFixed(1)}% confidence</div>
                `;
            } else {
                latestLetterDisplay.textContent = 'Waiting...';
            }
        }

        // Start detection
        async function startDetection() {
            try {
                if (!state.cameraActive) {
                    // Request camera access
                    stream = await navigator.mediaDevices.getUserMedia({
                        video: {
                            width: { ideal: CONFIG.videoWidth },
                            height: { ideal: CONFIG.videoHeight }
                        },
                        audio: false
                    });
                    state.cameraActive = true;
                    showSuccess('📷 Camera access granted!');
                }

                state.isDetecting = true;
                updateUI();
                startBtn.disabled = true;
                stopBtn.disabled = false;

                // Start detection loop
                detectionLoop();
            } catch (error) {
                showError(`❌ Camera access denied: ${error.message}`);
            }
        }

        // Stop detection
        function stopDetection() {
            state.isDetecting = false;
            if (state.detectionLoop) {
                clearTimeout(state.detectionLoop);
            }
            updateUI();
            startBtn.disabled = false;
            stopBtn.disabled = true;

            // Clear canvas
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, videoCanvas.width, videoCanvas.height);
        }

        // Detection loop
        async function detectionLoop() {
            if (!state.isDetecting || !stream) return;

            try {
                // Draw video frame
                const video = document.createElement('video');
                video.srcObject = stream;
                video.play();

                await new Promise(resolve => {
                    video.onloadedmetadata = resolve;
                });

                // Wait a bit for frame to load
                await new Promise(resolve => setTimeout(resolve, 100));

                ctx.drawImage(video, 0, 0, videoCanvas.width, videoCanvas.height);

                // Get canvas image
                const imageData = videoCanvas.toDataURL('image/jpeg');

                // Send to backend
                const response = await fetch('/process_frame', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ image: imageData })
                });

                if (response.ok) {
                    const result = await response.json();
                    if (result.detected_letter) {
                        state.currentLetter = result.detected_letter.letter;
                        state.currentConfidence = result.detected_letter.confidence;
                    }
                }

                // Calculate FPS
                state.frameCount++;
                const now = Date.now();
                if (now - state.lastFrameTime >= 1000) {
                    state.fps = state.frameCount;
                    fpsDisplay.textContent = state.fps;
                    state.frameCount = 0;
                    state.lastFrameTime = now;
                }

                updateUI();

                // Schedule next frame
                state.detectionLoop = setTimeout(detectionLoop, CONFIG.processingInterval);
            } catch (error) {
                console.error('Detection error:', error);
                state.detectionLoop = setTimeout(detectionLoop, CONFIG.processingInterval);
            }
        }

        // Capture letter
        function captureLetter() {
            if (state.currentLetter) {
                state.storedLetters.push(state.currentLetter);
                updateUI();
            }
        }

        // Delete last letter
        function deleteLetter() {
            if (state.storedLetters.length > 0) {
                state.storedLetters.pop();
                updateUI();
            }
        }

        // Add space
        function addSpace() {
            state.storedLetters.push(' ');
            updateUI();
        }

        // Clear all
        function clearAll() {
            state.storedLetters = [];
            updateUI();
        }

        // Button event listeners
        startBtn.addEventListener('click', startDetection);
        stopBtn.addEventListener('click', stopDetection);
        captureBtn.addEventListener('click', captureLetter);
        deleteBtn.addEventListener('click', deleteLetter);
        spaceBtn.addEventListener('click', addSpace);
        clearBtn.addEventListener('click', clearAll);

        // Keyboard shortcuts
        document.addEventListener('keydown', (e) => {
            if (e.key.toLowerCase() === 'w') captureLetter();
            if (e.key.toLowerCase() === 's') deleteLetter();
            if (e.key.toLowerCase() === 'b') deleteLetter();
            if (e.key.toLowerCase() === 'v') addSpace();
            if (e.key.toLowerCase() === 'c') clearAll();
            if (e.key.toLowerCase() === 'q') stopDetection();
        });

        // Initialize
        initializeCanvas();
        updateUI();
        stopBtn.disabled = true;
    </script>
</body>
</html>
